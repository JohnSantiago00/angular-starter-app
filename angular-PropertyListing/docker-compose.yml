services:
  server:
    build:
      context: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    ports:
      - "4200:4200"
    depends_on:
      - server
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - /app/node_modules
